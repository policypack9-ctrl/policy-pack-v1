version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_USER: postgres
      POSTGRES_DB: policypack_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Optionally, you can map the schema file to initialize the DB automatically
      - ./supabase/schema.sql:/docker-entrypoint-initdb.d/00-schema.sql

volumes:
  postgres_data:
